<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Premium</title>
    <link rel="icon" type="image/png" href="assets/img/favicon.png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <div id="seccion-login" class="container d-flex justify-content-center align-items-center flex-grow-1">
        <div class="caja-oscura p-5 shadow-lg text-center">
            <h2 class="texto-dorado mb-4">Ingresa tu cuenta</h2>
            <form id="form-login">
                <div class="mb-3 text-start">
                    <label class="form-label text-light">Correo electrónico</label>
                    <input type="email" class="form-control input-oscuro" required>
                </div>
                <div class="mb-4 text-start">
                    <label class="form-label text-light">Contraseña</label>
                    <input type="password" class="form-control input-oscuro" required>
                </div>
                <button type="submit" class="btn btn-dorado w-100 fw-bold">Entrar</button>
            </form>
        </div>
    </div>

    <div id="seccion-tarjeta" class="container d-none align-items-center justify-content-center flex-grow-1 my-5">
        <div class="row w-100">
            
            <div class="col-md-6 d-flex justify-content-center align-items-center mb-5 mb-md-0 perspective">
                <div class="tarjeta-3d shadow-lg" id="tarjeta-visual">
                    
                    <div class="tarjeta-cara tarjeta-frente p-4">
                        <h5 class="texto-dorado mb-5">Marca</h5>
                        <div class="mt-5 pt-4">
                            <small class="text-white-50 d-block mb-1">Nombre de cliente</small>
                            <div id="mostrar-nombre" class="fw-bold fs-5 text-white">Leon S. Kennedy</div>
                        </div>
                    </div>

                    <div class="tarjeta-cara tarjeta-reverso p-4">
                        <div class="bg-black w-100 mb-4" style="height: 40px; margin-left: -1.5rem; width: calc(100% + 3rem) !important;"></div>
                        
                        <div>
                            <small class="text-white-50 d-block mb-1">Número de tarjeta</small>
                            <h5 id="mostrar-numero" class="espaciado-letras mb-3 text-light">**** **** **** ****</h5>
                            
                            <div class="d-flex justify-content-between mt-3">
                                <div>
                                    <small class="text-white-50">Vencimiento</small>
                                    <div id="mostrar-vencimiento" class="text-light">MM/AA</div>
                                </div>
                                <div class="bg-light text-dark px-3 py-1 rounded">
                                    <small class="text-white-50 d-block" style="font-size: 0.7rem;">CVV</small>
                                    <div id="mostrar-cvv" class="fw-bold">***</div>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

            <div class="col-md-6">
                <div class="caja-oscura p-4 shadow-lg">
                    <h3 class="texto-dorado mb-4 text-center">Datos</h3>
                    <form>
                        <div class="mb-3 text-start">
                            <label for="input-nombre" class="form-label text-light">Nombre de cliente</label>
                            <input type="text" id="input-nombre" class="form-control input-oscuro" placeholder="Ej. Leon S. Kennedy">
                        </div>
                        <div class="mb-3 text-start">
                            <label for="input-numero" class="form-label text-light">Número de tarjeta</label>
                            <input type="text" id="input-numero" class="form-control input-oscuro" placeholder="0000 0000 0000 0000" maxlength="19" inputmode="numeric">
                        </div>
                        <div class="row text-start">
                            <div class="col-6 mb-3">
                                <label for="input-vencimiento" class="form-label text-light">Vencimiento</label>
                                <input type="text" id="input-vencimiento" class="form-control input-oscuro" placeholder="MM/AA" maxlength="5" inputmode="numeric">
                            </div>
                            <div class="col-6 mb-3">
                                <label for="input-cvv" class="form-label text-light">CVV</label>
                                <input type="password" id="input-cvv" class="form-control input-oscuro" placeholder="***" maxlength="4" inputmode="numeric">
                            </div>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <footer class="text-center py-4 mt-auto" style="background-color: rgba(10, 10, 10, 0.85); border-top: 1px solid var(--dorado); backdrop-filter: blur(5px);">
        <div class="container">
            <p class="mb-1 fw-bold texto-dorado fs-5">Desarrollado por Jairo</p>
            <p class="mb-0 text-light opacity-75 small">Estudiante de Ingeniería en Sistemas | TecNM Campus Pachuca (ITP)</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/script.js"></script>
</body>
</html>
